services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helmsman
      POSTGRES_PASSWORD: helmsman
      POSTGRES_DB: helmsman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helmsman"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+psycopg2://helmsman:helmsman@db:5432/helmsman
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-fake}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CHANNEL_WORKFLOW_ID: ${CHANNEL_WORKFLOW_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: ./web
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
